{% import 'macros/form.html' as form %}

{%- set yes_checked = 'checked' if data == 1 %}
{%- set no_checked = 'checked' if data != 1 %}

<li class="list-group-item calculated-quality-measure">
    <label class="radio" for="{{ field.field_name }}">
        {{ field.label }}
        {%- snippet 'scheming/form_snippets/help_text.html', field=field, data=data -%}
        <div class="pull-right">
        <label for="yes">Yes</label><input id="yes"  type="radio" name="{{field.field_name}}" value="YES" {{ yes_checked }} ></input>
        <label for="not">No</label><input id="no" type="radio" name="{{field.field_name}}" value="NO" {{ no_checked }} ></input>
        </div>
    </label>
</li>
